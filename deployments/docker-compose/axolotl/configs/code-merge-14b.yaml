base_model: Qwen/Qwen2.5-Coder-14B-Instruct
model_type: Qwen2ForCausalLM
tokenizer_type: Qwen2Tokenizer

load_in_8bit: false
load_in_4bit: false    # IMPORTANT: Disable quantization for merging to get full precision weights
strict: false
bnb_config_kwargs:
  llm_int8_enable_fp32_cpu_offload: true
dataset_processes: 1
hf_use_auth_token: true

datasets:
  - path: bigcode/the-stack
    name: default
    data_files: "data/go/train-00000-of-*.parquet" # Limit to 1 shard for debugging
    type: completion
    field: content
    streaming: true
    split: train
  - path: bigcode/the-stack
    name: default
    data_files: "data/python/train-00000-of-*.parquet" # Limit to 1 shard for debugging
    type: completion
    field: content
    streaming: true
    split: train
  - path: bigcode/the-stack
    name: default
    data_files: "data/javascript/train-00000-of-*.parquet" # Limit to 1 shard for debugging
    type: completion
    field: content
    streaming: true
    split: train
  - path: bigcode/the-stack
    name: default
    data_files: "data/typescript/train-00000-of-*.parquet" # Limit to 1 shard for debugging
    type: completion
    field: content
    streaming: true
    split: train

adapter: qlora
lora_model_dir: /workspace/output/qwen-14b-polyglot-lora  # Path to the adapter we just trained
output_dir: /workspace/output/qwen-14b-polyglot-merged   # Where to save the full merged model

dataset_prepared_path: /workspace/cache/prepared_polyglot_14b
val_set_size: 0.01

sequence_len: 4096
sample_packing: false
pad_to_sequence_len: true

lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - down_proj
  - up_proj

gradient_accumulation_steps: 16
micro_batch_size: 1
num_epochs: 1
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 0.0002

train_on_inputs: false
group_by_length: false
bf16: auto
fp16:
tf32: false

gradient_checkpointing: true
gpu_memory_limit: 20GiB
logging_steps: 1
flash_attention: true

loss_watchdog_threshold: 5.0
loss_watchdog_patience: 3

warmup_steps: 20
evals_per_epoch: 4
eval_max_new_tokens: 128
saves_per_epoch: 1
save_total_limit: 2
debug:
weight_decay: 0.0
special_tokens:
  pad_token: "<|endoftext|>"
