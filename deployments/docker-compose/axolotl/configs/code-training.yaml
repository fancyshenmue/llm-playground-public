base_model: Qwen/Qwen2.5-Coder-32B-Instruct
model_type: Qwen2ForCausalLM
tokenizer_type: Qwen2Tokenizer

load_in_8bit: false
load_in_4bit: true
strict: false
bnb_config_kwargs:
  llm_int8_enable_fp32_cpu_offload: false
dataset_processes: 1  # Reduced to 1 for ultimate stability (IPC/OOM issues)
hf_use_auth_token: true

datasets:
  - path: bigcode/the-stack
    data_files: "data/go/train-00000-of-*.parquet"  # 1 shard for stability test
    ds_type: parquet
    field: content
    type: completion
    streaming: true
    split: train
    # Enabling this can help split long code files instead of dropping them
    # In completion mode, this typically works in conjunction with sample_packing
    # If drops are still observed, it indicates forced filtering is active or pretraining_dataset logic is needed
dataset_prepared_path: /workspace/cache/prepared_go_v1_8k
val_set_size: 10
output_dir: /workspace/output/qwen-32b-go-lora

adapter: qlora
lora_model_dir:

sequence_len: 2048
sample_packing: false  # Disabled to force True Streaming (no length pre-sort)
pad_to_sequence_len: true  # Required when sample_packing=false

lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true
lora_fan_in_fan_out:
lora_modules_to_save:
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - down_proj
  - up_proj

gradient_accumulation_steps: 48
micro_batch_size: 1
num_epochs: 1
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 0.0001

train_on_inputs: false
group_by_length: false
bf16: true
fp16: false
tf32: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
gpu_memory_limit: 22GiB
early_stopping_patience:
resume_from_checkpoint:
local_rank:
logging_steps: 1
flash_attention: false
sdpa: true

loss_watchdog_threshold: 5.0
loss_watchdog_patience: 3

warmup_steps: 10
evals_per_epoch: 4
eval_table_size:
eval_max_new_tokens: 128
saves_per_epoch: 1
save_total_limit: 2  # Keep only the last 2 checkpoints to prevent disk full error
debug:
deepspeed:
weight_decay: 0.0
fsdp:
fsdp_config:
special_tokens:
  pad_token: "<|endoftext|>"
