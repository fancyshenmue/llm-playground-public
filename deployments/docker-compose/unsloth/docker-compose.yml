services:
  unsloth:
    user: "0:0"
    image: unsloth/unsloth:latest
    container_name: unsloth
    volumes:
      - dataset:/workspace/dataset
      - output:/workspace/output
      - ./scripts:/workspace/scripts
      - ./config.yaml:/workspace/config.yaml
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/workspace/dataset/.huggingface
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # Hyperparameters are now primarily driven by config.yaml
      # but can still be overridden via environment variables if needed.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    command: sleep infinity
    shm_size: 16g

volumes:
  dataset:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${DATASET_PATH}"
  output:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${OUTPUT_PATH}"
