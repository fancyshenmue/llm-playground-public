services:
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: arize_phoenix
    ports:
      - "16006:6006" # UI (Mapped to 16006 to avoid conflicts)
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - PHOENIX_COLLECTOR_OTLP_ENABLED=true
      - PHOENIX_GRPC_PORT=4317
      - PHOENIX_HTTP_PORT=4318
    volumes:
      - phoenix_data:/root/.phoenix
    networks:
      - arize-network

  ollama-proxy:
    build: ./proxy
    container_name: ollama_proxy
    ports:
      - "11435:11435"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - PHOENIX_COLLECTOR_URL=http://phoenix:4317
      - SERVICE_NAME=ollama-proxy
    volumes:
      - ./proxy:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - phoenix
    networks:
      - arize-network

  lms-proxy:
    build: ./proxy
    container_name: lms_proxy
    ports:
      - "12345:11435"
    environment:
      - OLLAMA_URL=http://host.docker.internal:1234 # Windows Host LM Studio
      - PHOENIX_COLLECTOR_URL=http://phoenix:4317
      - SERVICE_NAME=lms-proxy
    volumes:
      - ./proxy:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - phoenix
    networks:
      - arize-network

networks:
  arize-network:
    name: arize-network
    driver: bridge

volumes:
  phoenix_data:
