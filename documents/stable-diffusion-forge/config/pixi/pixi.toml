gradio = "==4.40.0"
accelerate = "==0.31.0"
transformers = "==4.46.1"
diffusers = "==0.31.0"
safetensors = "==0.4.2"
einops = "==0.4.1"
GitPython = "==3.1.32"
blendmodes = "==2022"
clean-fid = "==0.1.35"
diskcache = "==5.6.3"
facexlib = "==0.3.0"
httpcore = "==0.15"
